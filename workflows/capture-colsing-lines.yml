# Auto-capture closing lines for open bets.
#
# Runs every 30 minutes during the MLB day/evening window (UTC) and records the latest
# pre-game price for each open bet, so closing-line value is filled in with zero manual work.
#
# BEFORE THIS DOES ANYTHING USEFUL:
#   1) Add your key as a repo secret named ODDS_API_KEY
#      (GitHub repo -> Settings -> Secrets and variables -> Actions -> New repository secret).
#   2) Point betlog.py at SHARED storage (Postgres/Supabase). With local SQLite the bet
#      database isn't present in this runner, so there'd be nothing to update. The scheduled
#      job and the Streamlit app must read/write the SAME database.
#
# Cron is in UTC. The window below (roughly 16:00–04:00 UTC) covers afternoon through late
# West-Coast first pitches. Adjust to taste. Note GitHub may delay scheduled runs under load.

name: capture-closing-lines

on:
  schedule:
    - cron: "*/30 16-23 * * *"   # every 30 min, 16:00–23:30 UTC
    - cron: "*/30 0-4 * * *"     # every 30 min, 00:00–04:30 UTC (late games)
  workflow_dispatch: {}           # allow manual runs from the Actions tab

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests
      - name: Capture closing lines
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          CLV_WINDOW_HOURS: "8"
        run: python capture_closing_lines.py
